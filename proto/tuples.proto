syntax = "proto3";

package tuples;

service Tuples {
  rpc GetVersion(Empty) returns (VersionResponse);

  rpc RegisterSchema(RegisterSchemaRequest) returns (Empty);
  rpc GetSchema(GetSchemaRequest) returns (SchemaResponse);
  rpc ListSchemas(Empty) returns (ListSchemasResponse);

  rpc PutTuple(PutTupleRequest) returns (PutTupleResponse);
  rpc GetTuple(GetTupleRequest) returns (TupleResponse);

  rpc RegisterFilter(RegisterFilterRequest) returns (Empty);
  rpc ListFilters(Empty) returns (ListFiltersResponse);
  rpc MatchTuple(MatchTupleRequest) returns (MatchTupleResponse);

  rpc RegisterPlaybook(RegisterPlaybookRequest) returns (Empty);
  rpc GetPlaybook(GetPlaybookRequest) returns (PlaybookResponse);
  rpc ListPlaybooks(Empty) returns (ListPlaybooksResponse);
  rpc WatchTriggers(WatchTriggersRequest) returns (stream TriggerFiredEvent);

  // Agent management
  rpc RegisterAgent(RegisterAgentRequest) returns (Empty);
  rpc GetAgent(GetAgentRequest) returns (AgentResponse);
  rpc ListAgents(Empty) returns (ListAgentsResponse);

  // Playbook execution
  rpc RunPlaybook(RunPlaybookRequest) returns (RunPlaybookResponse);
  rpc GetRun(GetRunRequest) returns (RunResponse);
  rpc ListRuns(Empty) returns (ListRunsResponse);

  // Agent lifecycle callbacks (called by agents themselves)
  rpc NotifyAgentStarted(AgentLifecycleRequest) returns (Empty);
  rpc NotifyAgentCompleted(AgentCompletedRequest) returns (Empty);

  // Pubsub for UI — stream of run lifecycle events
  rpc WatchRun(WatchRunRequest) returns (stream RunEvent);

  // Pubsub for agents — subscribe to receive dispatch events
  rpc WatchAgentDispatch(WatchAgentDispatchRequest) returns (stream AgentDispatchedEvent);
}

message Empty {}

message VersionResponse {
  string version = 1;
}

message RegisterSchemaRequest {
  string name = 1;
  /// JSON Schema definition serialized as a JSON string.
  string definition = 2;
}

message GetSchemaRequest {
  string name = 1;
}

message SchemaResponse {
  string name = 1;
  string definition = 2;
}

message ListSchemasResponse {
  repeated SchemaResponse schemas = 1;
}

message PutTupleRequest {
  string trace_id = 1;
  /// Schema name; must be registered before putting a tuple.
  string type = 2;
  /// User payload as a JSON object string; validated against the named schema.
  string data = 3;
  /// If true, block until the tuple is durably committed before returning.
  /// If false (default), the response may be returned before the write is committed.
  bool guaranteed_write = 4;
}

message PutTupleResponse {
  /// Server-generated UUID v7.
  string uuid7 = 1;
  /// Server-assigned creation timestamp (RFC 3339).
  string created_at = 2;
}

message GetTupleRequest {
  string uuid7 = 1;
}

message TupleResponse {
  string uuid7 = 1;
  string trace_id = 2;
  string created_at = 3;
  string type = 4;
  string data = 5;
}

message RegisterFilterRequest {
  /// JSON-serialized Filter definition.
  string definition = 1;
}

message FilterResponse {
  string id = 1;
  /// JSON-serialized Filter definition.
  string definition = 2;
}

message ListFiltersResponse {
  repeated FilterResponse filters = 1;
}

message MatchTupleRequest {
  /// JSON object to match against registered filters.
  string data = 1;
}

message MatchTupleResponse {
  repeated string filter_ids = 1;
}

message RegisterPlaybookRequest {
  /// JSON-serialized Playbook definition.
  string definition = 1;
}

message GetPlaybookRequest {
  string name = 1;
}

message PlaybookResponse {
  string name = 1;
  /// JSON-serialized Playbook definition.
  string definition = 2;
}

message ListPlaybooksResponse {
  repeated PlaybookResponse playbooks = 1;
}

message WatchTriggersRequest {
  /// Filter to a specific playbook; empty means all playbooks.
  string playbook = 1;
}

message TriggerFiredEvent {
  string playbook    = 1;
  string agent       = 2;
  string tuple_uuid7 = 3;
  string tuple_type  = 4;
  string tuple_data  = 5;
  map<string, string> mapped_params = 6;
  string trace_id    = 7;
}

// ── Agent management ────────────────────────────────────────────────────────

message RegisterAgentRequest {
  string name        = 1;
  string description = 2;
  /// Name of the registered Schema for this agent's input parameters.
  string schema      = 3;
}

message GetAgentRequest {
  string name = 1;
}

message AgentResponse {
  string name        = 1;
  string description = 2;
  string schema      = 3;
}

message ListAgentsResponse {
  repeated AgentResponse agents = 1;
}

// ── Playbook execution ───────────────────────────────────────────────────────

message RunPlaybookRequest {
  string playbook_name = 1;
  /// JSON object matching the conductor agent's schema.
  string params        = 2;
}

message RunPlaybookResponse {
  string trace_id = 1;
}

message GetRunRequest {
  string trace_id = 1;
}

message RunResponse {
  string trace_id      = 1;
  string playbook_name = 2;
  string started_at    = 3;
  /// Serialised RunStatus: "Running", "Completed", or "Failed: <reason>".
  string status        = 4;
}

message ListRunsResponse {
  repeated RunResponse runs = 1;
}

// ── Run watch ───────────────────────────────────────────────────────────────

message WatchRunRequest {
  string trace_id = 1;
}

message RunEvent {
  string trace_id = 1;
  oneof event {
    AgentDispatchedEvent agent_dispatched = 2;
    AgentStartedEvent    agent_started    = 3;
    AgentCompletedEvent  agent_completed  = 4;
    RunCompletedEvent    run_completed    = 5;
  }
}

message AgentDispatchedEvent {
  string agent_run_id = 1;
  string agent_name   = 2;
  /// JSON object of resolved agent parameters.
  string params       = 3;
}

message AgentStartedEvent {
  string agent_run_id = 1;
}

message AgentCompletedEvent {
  string agent_run_id = 1;
  bool   success      = 2;
  string error        = 3;
}

message RunCompletedEvent {
  bool   success = 1;
  string error   = 2;
}

// ── Agent dispatch watch ─────────────────────────────────────────────────────

message WatchAgentDispatchRequest {
  /// Only receive dispatch events for this agent name.
  string agent_name = 1;
}

// ── Agent lifecycle callbacks ────────────────────────────────────────────────

message AgentLifecycleRequest {
  string trace_id     = 1;
  string agent_run_id = 2;
}

message AgentCompletedRequest {
  string trace_id     = 1;
  string agent_run_id = 2;
  bool   success      = 3;
  string error        = 4;
}
